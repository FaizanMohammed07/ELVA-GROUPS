version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: elva-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - elva-prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: elva-backend
    restart: always
    expose:
      - '5000'
    environment:
      NODE_ENV: production
    env_file:
      - ./backend/.env.prod
    depends_on:
      - redis
    networks:
      - elva-prod
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: elva-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    networks:
      - elva-prod

  frontend_builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: elva-frontend-builder
    volumes:
      - frontend_build:/app/dist

volumes:
  redis_prod_data:
  frontend_build:

networks:
  elva-prod:
    driver: bridge
