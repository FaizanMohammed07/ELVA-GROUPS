<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A1A0E"/>
      <stop offset="100%" style="stop-color:#1A0E08"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Clay pot/vase -->
  <path d="M 155 310 Q 145 250 160 200 Q 170 160 200 140 Q 230 160 240 200 Q 255 250 245 310 Z" fill="none" stroke="#C9A96E" stroke-width="2"/>
  <ellipse cx="200" cy="310" rx="50" ry="12" fill="none" stroke="#C9A96E" stroke-width="2"/>
  <ellipse cx="200" cy="140" rx="40" ry="10" fill="none" stroke="#C9A96E" stroke-width="2"/>
  <!-- Pot handles -->
  <path d="M 160 210 Q 120 210 120 240 Q 120 270 160 265" fill="none" stroke="#C9A96E" stroke-width="2"/>
  <path d="M 240 210 Q 280 210 280 240 Q 280 270 240 265" fill="none" stroke="#C9A96E" stroke-width="2"/>
  <!-- Decorative pattern on pot -->
  <path d="M 165 220 Q 200 215 235 220" stroke="#E8C97A" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 162 240 Q 200 235 238 240" stroke="#E8C97A" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 160 260 Q 200 255 240 260" stroke="#E8C97A" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Decorative dots -->
  <circle cx="185" cy="180" r="3" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>
  <circle cx="200" cy="175" r="3" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>
  <circle cx="215" cy="180" r="3" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>
  <!-- Background pattern -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.12"/>
</svg>
