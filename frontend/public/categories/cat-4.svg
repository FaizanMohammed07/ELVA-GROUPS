<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E1A14"/>
      <stop offset="100%" style="stop-color:#081208"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- House/home illustration -->
  <polygon points="200,100 100,200 300,200" fill="none" stroke="#C9A96E" stroke-width="2"/>
  <rect x="120" y="200" width="160" height="130" fill="none" stroke="#C9A96E" stroke-width="2"/>
  <!-- Door -->
  <rect x="175" y="265" width="50" height="65" rx="25 25 0 0" fill="none" stroke="#E8C97A" stroke-width="1.5"/>
  <!-- Windows -->
  <rect x="130" y="220" width="40" height="35" rx="2" fill="none" stroke="#E8C97A" stroke-width="1.5"/>
  <line x1="150" y1="220" x2="150" y2="255" stroke="#E8C97A" stroke-width="1" opacity="0.6"/>
  <line x1="130" y1="237" x2="170" y2="237" stroke="#E8C97A" stroke-width="1" opacity="0.6"/>
  <rect x="230" y="220" width="40" height="35" rx="2" fill="none" stroke="#E8C97A" stroke-width="1.5"/>
  <line x1="250" y1="220" x2="250" y2="255" stroke="#E8C97A" stroke-width="1" opacity="0.6"/>
  <line x1="230" y1="237" x2="270" y2="237" stroke="#E8C97A" stroke-width="1" opacity="0.6"/>
  <!-- Chimney -->
  <rect x="225" y="120" width="25" height="45" fill="none" stroke="#C9A96E" stroke-width="1.5"/>
  <!-- Decorative stars -->
  <circle cx="120" cy="130" r="2" fill="#C9A96E" opacity="0.5"/>
  <circle cx="290" cy="150" r="1.5" fill="#C9A96E" opacity="0.4"/>
  <circle cx="80" cy="280" r="2" fill="#C9A96E" opacity="0.3"/>
  <circle cx="320" cy="290" r="1.5" fill="#C9A96E" opacity="0.35"/>
</svg>
