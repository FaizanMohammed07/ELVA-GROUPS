<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5EFE6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EDE0CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4B896;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:0.1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bgGrad)"/>

  <!-- Large decorative circle top right -->
  <circle cx="1100" cy="150" r="350" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.3"/>
  <circle cx="1100" cy="150" r="280" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.2"/>
  <circle cx="1100" cy="150" r="420" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.15"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#C9A96E" stroke-width="0.3" opacity="0.4"/>
  </pattern>
  <rect width="1440" height="900" fill="url(#grid)" opacity="0.3"/>

  <!-- Decorative cross/floral elements -->
  <g opacity="0.15" transform="translate(900, 400)">
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#8B6914" stroke-width="1"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#8B6914" stroke-width="1"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#8B6914" stroke-width="1"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#8B6914" stroke-width="0.5"/>
  </g>
  <g opacity="0.12" transform="translate(1200, 600)">
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#8B6914" stroke-width="1"/>
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#8B6914" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="none" stroke="#8B6914" stroke-width="1"/>
  </g>

  <!-- Warm overlay bottom -->
  <rect x="0" y="600" width="1440" height="300" fill="url(#goldGrad)"/>

  <!-- Floating gift box illustration right side -->
  <g transform="translate(950, 300)" opacity="0.18">
    <!-- Box -->
    <rect x="0" y="80" width="200" height="160" rx="4" fill="none" stroke="#8B6914" stroke-width="2"/>
    <!-- Lid -->
    <rect x="-10" y="60" width="220" height="30" rx="4" fill="none" stroke="#8B6914" stroke-width="2"/>
    <!-- Ribbon vertical -->
    <rect x="90" y="60" width="20" height="180" fill="none" stroke="#8B6914" stroke-width="2"/>
    <!-- Ribbon horizontal -->
    <rect x="0" y="120" width="200" height="20" fill="none" stroke="#8B6914" stroke-width="2"/>
    <!-- Bow left -->
    <path d="M 100 60 Q 60 20 40 40 Q 60 60 100 60" fill="none" stroke="#8B6914" stroke-width="2"/>
    <!-- Bow right -->
    <path d="M 100 60 Q 140 20 160 40 Q 140 60 100 60" fill="none" stroke="#8B6914" stroke-width="2"/>
  </g>

  <!-- Flower/leaf decorative top left -->
  <g transform="translate(200, 200)" opacity="0.12">
    <circle cx="0" cy="-50" r="25" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <circle cx="43" cy="-25" r="25" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <circle cx="43" cy="25" r="25" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <circle cx="0" cy="50" r="25" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <circle cx="-43" cy="25" r="25" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <circle cx="-43" cy="-25" r="25" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#8B6914" stroke-width="1"/>
  </g>

  <!-- ELUNORA monogram watermark center-right -->
  <text x="1050" y="520" font-family="Georgia, serif" font-size="180" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.08" text-anchor="middle">ELUNORA</text>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" style="stop-color:#000000;stop-opacity:0" />
    <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15" />
  </radialGradient>
  <rect width="1440" height="900" fill="url(#vignette)"/>
</svg>
