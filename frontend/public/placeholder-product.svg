  </defs>
  <rect width="400" height="533" fill="url(#bg)"/>
  <!-- Gift box outline -->
  <rect x="120" y="180" width="160" height="130" rx="4" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
  <rect x="110" y="160" width="180" height="28" rx="3" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
