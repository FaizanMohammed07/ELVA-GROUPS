  <rect x="120" y="196" width="160" height="14" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.4"/>
  <!-- Bow -->
  <path d="M 200 160 Q 168 130 148 148 Q 165 165 200 160" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.4"/>
  <path d="M 200 160 Q 232 130 252 148 Q 235 165 200 160" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.4"/>
