<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/elva-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="description" content="ELUNORA — Premium Handcrafted Gifts & Lifestyle Products. Discover unique, personalized gifts crafted with love." />
    <meta property="og:title" content="ELUNORA — Premium Handcrafted Gifts" />
    <meta property="og:description" content="India's finest handcrafted gifting & lifestyle brand." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Security headers via meta — backend Helmet headers are authoritative, these are a fallback -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <!-- Permissions policy — lock down browser APIs not used by the storefront -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=()" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>ELUNORA — Premium Handcrafted Gifts & Lifestyle</title>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <!-- Razorpay Checkout SDK — loaded here so it's available before checkout interaction -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
